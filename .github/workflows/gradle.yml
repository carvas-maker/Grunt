name: Grunteon CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Package universal runnable UI JAR
        run: .\gradlew.bat :grunt-ui:packageUniversalUberJar --stacktrace --no-daemon

      - name: Verify universal JAR contents
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $jar = Get-ChildItem -Path "grunt-ui/build/compose/jars" -Filter "*-all.jar" | Select-Object -First 1
          if (-not $jar) {
            throw "Universal UI JAR was not found."
          }

          $requiredEntries = @(
            "net/spartanb312/grunteon/ui/AppKt.class",
            "net/spartanb312/grunteon/obfuscator/Grunteon.class",
            "net/spartanb312/grunt/ir/ssa/core/SSAFunction.class",
            "net/spartanb312/grunteon/index/io/ReadKt.class",
            "net/spartanb312/everett/bootstrap/Main.class",
            "skiko-windows-x64.dll",
            "libskiko-linux-x64.so",
            "libskiko-macos-x64.dylib",
            "libskiko-macos-arm64.dylib"
          )

          $zip = [System.IO.Compression.ZipFile]::OpenRead($jar.FullName)
          try {
            $missingEntries = @($requiredEntries | Where-Object { $null -eq $zip.GetEntry($_) })
            if ($missingEntries.Count -gt 0) {
              throw "Universal UI JAR is missing required entries: $($missingEntries -join ', ')"
            }
          } finally {
            $zip.Dispose()
          }

          Write-Host "Verified $($jar.Name) ($([math]::Round($jar.Length / 1MB, 2)) MiB)."

      - name: Upload universal runnable UI JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: grunteon-ui-universal-jar
          path: |
            grunt-ui/build/compose/jars/*-all.jar
          if-no-files-found: error
