name: Grunteon CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Package universal runnable UI JAR
        run: .\gradlew.bat :grunt-ui:packageUniversalUberJar --stacktrace --no-daemon

      - name: Upload universal runnable UI JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: grunteon-ui-universal-jar
          path: |
            grunt-ui/build/compose/jars/*-all.jar
          if-no-files-found: error
